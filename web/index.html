<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="VCollab Web RDP Client — Access your remote desktop from the browser">
    <title>VCollab — Web RDP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Login Screen -->
    <div id="login-screen" class="login-screen">
        <div class="login-backdrop"></div>
        <div class="login-card">
            <div class="login-header">
                <div class="login-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
                        <line x1="8" y1="21" x2="16" y2="21"/>
                        <line x1="12" y1="17" x2="12" y2="21"/>
                    </svg>
                </div>
                <h1>Remote Desktop</h1>
                <p class="login-subtitle">Connect to your workspace</p>
            </div>
            <form id="login-form" autocomplete="off">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required
                           placeholder="e.g. administrator" autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required
                           placeholder="••••••••" autocomplete="current-password">
                </div>
                <div class="form-group">
                    <label for="domain">Domain <span class="optional">(optional)</span></label>
                    <input type="text" id="domain" name="domain"
                           placeholder="e.g. CORP">
                </div>
                <div class="form-group form-inline">
                    <label class="checkbox-label">
                        <input type="checkbox" id="fullscreen-connect" checked>
                        <span>Connect in Fullscreen</span>
                    </label>
                </div>
                <button type="submit" id="connect-btn" class="btn-connect">
                    <span class="btn-text">Connect</span>
                    <span class="btn-spinner" hidden>
                        <svg class="spinner" viewBox="0 0 24 24">
                            <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" fill="none" stroke-dasharray="31.4 31.4"/>
                        </svg>
                    </span>
                </button>
            </form>
            <div id="login-error" class="login-error" hidden></div>
        </div>
    </div>

    <!-- RDP Canvas Screen -->
    <div id="rdp-screen" class="rdp-screen" hidden>
        <div class="canvas-wrapper">
            <canvas id="rdp-canvas" tabindex="0"></canvas>
        </div>
        <!-- FPS overlay — togglable, very light -->
        <div id="fps-overlay" class="fps-overlay" hidden>
            <span id="fps-text">0 FPS</span>
        </div>
        <div id="status-bar" class="status-bar">
            <div class="status-indicator">
                <span id="status-dot" class="status-dot connected"></span>
                <span id="status-text">Connected</span>
            </div>
            <div class="status-info">
                <span id="resolution-text">1920×1080</span>
                <span id="codec-indicator" class="codec-badge" hidden></span>
                <div class="status-actions">
                    <!-- Quality slider -->
                    <div class="quality-group">
                        <button id="quality-toggle-btn" class="btn-toolbar" title="Image Quality">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="12" r="3"/>
                                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                            </svg>
                        </button>
                        <div id="quality-popup" class="quality-popup" hidden>
                            <label>Quality: <span id="quality-value">75</span>%</label>
                            <input type="range" id="quality-slider" min="10" max="100" value="75" step="5">
                        </div>
                    </div>
                    <!-- Clipboard paste -->
                    <button id="clipboard-btn" class="btn-toolbar" title="Paste from Clipboard">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
                            <rect x="8" y="2" width="8" height="4" rx="1" ry="1"/>
                        </svg>
                    </button>
                    <!-- Special keys -->
                    <button id="alttab-btn" class="btn-toolbar" title="Send Alt+Tab">
                        <span class="btn-key-label">⇥</span>
                    </button>
                    <button id="cad-btn" class="btn-toolbar" title="Send Ctrl+Alt+Del">
                        <span class="btn-key-label">⌦</span>
                    </button>
                    <button id="fps-toggle-btn" class="btn-toolbar" title="Toggle FPS (Ctrl+Shift+P)">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
                        </svg>
                    </button>
                    <button id="fullscreen-btn" class="btn-toolbar" title="Fullscreen (Ctrl+Shift+F)">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="15 3 21 3 21 9"/>
                            <polyline points="9 21 3 21 3 15"/>
                            <line x1="21" y1="3" x2="14" y2="10"/>
                            <line x1="3" y1="21" x2="10" y2="14"/>
                        </svg>
                    </button>
                    <button id="disconnect-btn" class="btn-disconnect" title="Disconnect (Ctrl+Shift+D)">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                            <line x1="18" y1="6" x2="6" y2="18"/>
                            <line x1="6" y1="6" x2="18" y2="18"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
